<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自动建表</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>自动建表</h1>
      <p class="desc">把 Coze 回复粘贴到工作台，先提取并预检 SQL，再确认执行写入 SQL Server。</p>

      <section class="card">
        <label for="requirementInput">需求描述（可选）</label>
        <textarea
          id="requirementInput"
          placeholder="例如：生成用户表、订单表和索引，字段名使用 snake_case。"
        ></textarea>
      </section>

      <section class="card">
        <label for="cozeOutput">Coze 输出原文</label>
        <textarea
          id="cozeOutput"
          placeholder="把 Coze 的完整回复粘贴到这里，支持带 ```sql``` 代码块的文本。"
        ></textarea>
        <div class="actions compact">
          <button id="extractButton" type="button" class="secondary">提取 SQL</button>
          <span id="parseStatus" class="hint">未提取</span>
        </div>
      </section>

      <section class="card">
        <label for="sqlInput">SQL Server 建表脚本</label>
        <textarea
          id="sqlInput"
          placeholder="提取后的 SQL 会出现在这里，你也可以手动编辑。"
        ></textarea>
      </section>

      <div class="actions">
        <button id="previewButton" type="button" class="secondary">预检 SQL</button>
        <button id="executeButton" type="button">执行建表</button>
        <button id="clearButton" type="button" class="secondary">清空</button>
      </div>

      <section class="card small">
        <div class="status-line">
          <span>服务状态：</span>
          <strong id="statusText">检测中</strong>
        </div>
        <div class="status-line">
          <span>执行结果：</span>
          <strong id="resultStatus">未执行</strong>
        </div>
        <div class="status-line">
          <span>处理阶段：</span>
          <strong id="resultMode">-</strong>
        </div>
        <div class="status-line">
          <span>执行语句数：</span>
          <strong id="resultCount">0</strong>
        </div>
        <div class="status-line">
          <span>新建表：</span>
          <strong id="resultTables">-</strong>
        </div>
        <div class="status-line">
          <span>数据库可执行：</span>
          <strong id="resultDbReady">-</strong>
        </div>
      </section>

      <section class="card">
        <label for="resultOutput">详细返回</label>
        <textarea id="resultOutput" readonly placeholder="执行后这里会显示结果。"></textarea>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
