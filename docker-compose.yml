services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  backend:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DB_HOST: sqlserver
      DB_PORT: "1433"
      DB_USER: sa
      DB_PASSWORD: "YourStrong!Passw0rd"
      DB_NAME: coze_demo_db
      PORT: "3000"
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      DB_WAIT_MAX_ATTEMPTS: "90"
      DB_WAIT_DELAY_MS: "2000"
    ports:
      - "3000:3000"
    depends_on:
      - sqlserver
    command: ["sh", "-c", "node wait-db.js && node server.js"]

volumes:
  sqlserver_data:
